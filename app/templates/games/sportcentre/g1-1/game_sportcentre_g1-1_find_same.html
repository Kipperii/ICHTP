      // ---------------- 指標映射 ----------------
      function createPointerMapper(game) {
        const state = { rect: null };
        function updateRect() {
          state.rect = game.canvas.getBoundingClientRect();
        }
        updateRect();
        game.scale.on(Phaser.Scale.Events.RESIZE, updateRect);
        window.addEventListener("resize", updateRect);
        window.addEventListener("orientationchange", updateRect);
        return function map(evt) {
          const rect = state.rect || game.canvas.getBoundingClientRect();
          const cssW = rect.width,
            cssH = rect.height;
          const gw = game.scale.gameSize.width,
            gh = game.scale.gameSize.height;
          const s = Math.min(cssW / gw, cssH / gh);
          const offX = (cssW - gw * s) / 2;
          const offY = (cssH - gh * s) / 2;
          const cx = evt.clientX - rect.left;
          const cy = evt.clientY - rect.top;
          let x = (cx - offX) / s;
          let y = (cy - offY) / s;
          x = Math.round(x * 2) / 2;
          y = Math.round(y * 2) / 2;
          return {
            x: Phaser.Math.Clamp(x, 0, gw),
            y: Phaser.Math.Clamp(y, 0, gh),
          };
        };
      }

      // ---------------- 評價系統 ----------------
      function gradeByPerformance(seconds, correctCount, totalTarget) {
        const acc = Math.max(
          0,
          Math.min(1, correctCount / Math.max(1, totalTarget))
        );
        const timeScore =
          seconds <= 40 ? 1 : seconds <= 60 ? 0.85 : seconds <= 90 ? 0.7 : 0.5;
        const final = 0.6 * timeScore + 0.4 * acc;
        if (final >= 0.9) return { grade: "A", msg: "速度與準度都很棒！" };
        if (final >= 0.75)
          return { grade: "B", msg: "表現優秀，再快一點更好！" };
        if (final >= 0.6) return { grade: "C", msg: "穩定發揮，繼續加油！" };
        return { grade: "D", msg: "別急，下一次一定更好！" };
      }

      // ---------------- 自適應難度 ----------------
      class DifficultyManager {
        constructor(initD = 0.5) {
          this.d = initD;
          this.accBuf = [];
          this.rtBuf = [];
          this.diffHistory = [];
        }
        record(ok, rtMs) {
          const N = 12;
          this.accBuf.push(ok ? 1 : 0);
          if (this.accBuf.length > N) this.accBuf.shift();
          this.rtBuf.push(rtMs);
          if (this.rtBuf.length > N) this.rtBuf.shift();
          const acc =
            this.accBuf.reduce((a, b) => a + b, 0) / this.accBuf.length;
          const sorted = [...this.rtBuf].sort((a, b) => a - b);
          const rtMed = (sorted[Math.floor(sorted.length / 2)] || 1500) / 1000;
          let nd = this.d;
          if (acc >= 0.85 && rtMed <= 1.2) nd = Math.min(0.95, this.d + 0.1);
          else if (acc <= 0.6 || rtMed >= 2.0)
            nd = Math.max(0.15, this.d - 0.1);
          this.d = 0.5 * this.d + 0.5 * nd;

          // 記錄難度歷史
          this.diffHistory.push({
            difficulty: this.d,
            accuracy: acc,
            responseTime: rtMed,
            timestamp: new Date().getTime(),
          });
        }
      }

      // ---------------- UI ----------------
      function makeButton(scene, centerX, centerY, text) {
        const w = 180,
          h = 90;
        const g = scene.add.graphics();
        g.fillStyle(0x000000, 0.15).fillRoundedRect(4, 6, w, h, 18);
        g.fillStyle(0xe56e5b, 1).fillRoundedRect(0, 0, w, h, 18);
        g.lineStyle(3, 0xffffff, 1).strokeRoundedRect(0, 0, w, h, 18);
        const t = scene.add
          .text(w / 2, h / 2, text, {
            font: "bold 28px Arial",
            fill: "#fff",
            stroke: "#000",
            strokeThickness: 6,
          })
          .setOrigin(0.5);
        const inner = scene.add.container(0, 0, [g, t]);
        const cont = scene.add.container(centerX - w / 2, centerY - h / 2, [
          inner,
        ]);
        cont.setSize(w, h);
        cont.setInteractive(
          new Phaser.Geom.Rectangle(0, 0, w, h),
          Phaser.Geom.Rectangle.Contains
        );
        cont.input.useHandCursor = true;
        cont.__inner = inner;
        return cont;
      }

      function makeCard(scene, key, isQuestion, label) {
        const w = isQuestion ? 320 : 210,
          h = isQuestion ? 220 : 170;
        const pad = 10,
          boxW = w - 2 * pad,
          boxH = h - 2 * pad;

        const g = scene.add.graphics();
        g.fillStyle(0x000000, 0.28).fillRoundedRect(4, 6, w, h, 10);
        g.fillStyle(CARD_BG, 1).fillRoundedRect(0, 0, w, h, 10);
        g.lineStyle(2, CARD_BORDER, 0.95).strokeRoundedRect(
          2,
          2,
          w - 4,
          h - 4,
          8
        );

        const img = scene.add.image(0, 0, key).setOrigin(0.5);
        const sx = boxW / (img.width || boxW),
          sy = boxH / (img.height || boxH);
        const s = Math.max(sx, sy);
        img.setScale(s);
        img.x = pad + boxW / 2;
        img.y = pad + boxH / 2;

        const inner = scene.add.container(0, 0, [g, img]);
        if (!isQuestion && label) {
          const lt = scene.add
            .text(10, h - 10, label + ".", {
              font: "bold 22px Arial",
              fill: "#fff",
              stroke: "#000",
              strokeThickness: 5,
            })
            .setOrigin(0, 1);
          inner.add(lt);
        }
        const cont = scene.add.container(0, 0, [inner]);
        cont.setSize(w, h);
        cont.setInteractive(
          new Phaser.Geom.Rectangle(0, 0, w, h),
          Phaser.Geom.Rectangle.Contains
        );
        cont.input.useHandCursor = true;
        cont.__inner = inner;
        cont.__img = img;
        cont.__size = { w, h, boxW, boxH, pad };
        return cont;
      }

        const inner = cont.__inner;

        const cy = cont.y + cont.height / 2;

        // 卡片彈跳效果
        scene.tweens.add({
          targets: inner,
          scaleX: 1.15,
          scaleY: 1.15,
          duration: 120,
          yoyo: true,
          ease: "Back.easeOut",
          onComplete: () => {
            // 添加星星效果
            for (let i = 0; i < 8; i++) {
              createStar(scene, cx, cy, i);
            }
          },
        });

        // 閃光消失
        scene.tweens.add({
          targets: flash,
          alpha: 0,
          scale: 1.3,
          duration: 250,
          onComplete: () => flash.destroy(),
        });

        // 光暈效果

          .rectangle(cx, cy, cont.width + 10, cont.height + 10, 0xffff00, 0)
          .setDepth(29);
        scene.tweens.add({

          alpha: 0.4,
          duration: 150,
          yoyo: true,
          onComplete: () => glow.destroy(),
        });
      }

      // 創建星星效果
      function createStar(scene, x, y, index) {
        // 每個星星往不同方向發射
        const angle = (index / 8) * Math.PI * 2;
        const distance = 50 + Math.random() * 30;
        const duration = 300 + Math.random() * 200;

        // 創建星形
        const points = [];
        const outerRadius = 8;
        const innerRadius = 4;
        let rot = (Math.PI / 2) * 3;
        const step = Math.PI / 5;

        for (let i = 0; i < 10; i++) {
          const radius = i % 2 === 0 ? outerRadius : innerRadius;
          points.push({
            x: x + Math.cos(rot) * radius,
            y: y + Math.sin(rot) * radius,
          });
          rot += step;
        }

        const star = scene.add.polygon(x, y, points, 0xffff00).setDepth(32);

        // 設置發射路徑
        scene.tweens.add({
          targets: star,
          x: x + Math.cos(angle) * distance,
          y: y + Math.sin(angle) * distance,
          angle: 180 + Math.random() * 180,
          alpha: 0,
          scale: 0.5 + Math.random() * 0.5,
          duration: duration,
          ease: "Cubic.easeOut",
          onComplete: () => star.destroy(),
        });
      }

      // 改進的錯誤反饋效果
      function fxWrong(scene, cont) {
        // 震動效果
        scene.cameras.main.shake(150, 0.006);

        // 紅色閃爍覆蓋
        const overlay = scene.add
          .rectangle(
            cont.x + cont.width / 2,
            cont.y + cont.height / 2,
            cont.width + 4,
            cont.height + 4,
            0xff0000,
            0.5
          )
          .setDepth(30);

        // X符號
        const crossSize = Math.min(cont.width, cont.height) * 0.6;
        const cx = cont.x + cont.width / 2;
        const cy = cont.y + cont.height / 2;
        const thickness = 6;

        const cross1 = scene.add.graphics().setDepth(31);
        cross1.lineStyle(thickness, 0xff0000, 0.8);
        cross1.beginPath();
        cross1.moveTo(cx - crossSize / 2, cy - crossSize / 2);
        cross1.lineTo(cx + crossSize / 2, cy + crossSize / 2);
        cross1.strokePath();
        cross1.setAlpha(0);

        const cross2 = scene.add.graphics().setDepth(31);
        cross2.lineStyle(thickness, 0xff0000, 0.8);
        cross2.beginPath();
        cross2.moveTo(cx + crossSize / 2, cy - crossSize / 2);
        cross2.lineTo(cx - crossSize / 2, cy + crossSize / 2);
        cross2.strokePath();
        cross2.setAlpha(0);

        // 動畫序列
        scene.tweens.add({
          targets: [cross1, cross2],
          alpha: 1,
          duration: 80,
          onComplete: () => {
            scene.tweens.add({
              targets: cont,
              x: cont.x + 5,
              duration: 50,
              yoyo: true,
              repeat: 2,
              ease: "Sine.easeInOut",
              onComplete: () => {
                scene.tweens.add({
                  targets: [overlay, cross1, cross2],
                  alpha: 0,
                  duration: 150,
                  onComplete: () => {
                    overlay.destroy();
                    cross1.destroy();
                    cross2.destroy();
                  },
                });
              },
            });
          },
        });
      }

      // ---------------- 數據收集 ----------------
      async function logGameData(gameData) {
        // 收集詳細的遊戲數據以支持研究和分析
        const sessionData = {
          timestamp: new Date().toISOString(),
          sessionId: gameData.sessionId || `session_${Date.now()}`,
          playerData: {
            accuracy: gameData.correctCount / Math.max(1, gameData.totalRounds),
            avgResponseTime:
              gameData.responseTimeTotal / Math.max(1, gameData.totalRounds),
            finalDifficulty: gameData.difficulty,
            difficultyHistory: gameData.difficultyHistory || [],
            performanceByRound: gameData.roundStats || [],
          },
          gameSettings: {
            timeLimit: TIME_START,
            targetCorrect: TARGET_CORRECT,
            bonusRoundInterval: BONUS_ROUND_INTERVAL,
          },
          deviceInfo: {
            screenWidth: window.innerWidth,
            screenHeight: window.innerHeight,
            userAgent: navigator.userAgent,
          },
        };

        // 將數據存到本地存儲
        try {
          const offlineData = JSON.parse(
            localStorage.getItem("offlineGameData") || "[]"
          );
          offlineData.push(sessionData);
          localStorage.setItem("offlineGameData", JSON.stringify(offlineData));
          console.log("Game data logged to local storage");

          // 可選：如果在開發環境，輸出到控制台
          if (
            window.location.hostname === "localhost" ||
            window.location.hostname === "127.0.0.1"
          ) {
            console.table({
              "Session ID": sessionData.sessionId,
              Timestamp: sessionData.timestamp,
              Accuracy: sessionData.playerData.accuracy.toFixed(2),
              "Avg Response Time":
                sessionData.playerData.avgResponseTime.toFixed(2) + "ms",
              "Final Difficulty":
                sessionData.playerData.finalDifficulty.toFixed(2),
            });
          }
        } catch (err) {
          console.error("Error logging game data:", err);
        }

        return sessionData;
      }

// ---------------- 遊戲場景 ----------------
      class SceneGame extends Phaser.Scene {

          this.tempKeys = [];

          this.timeWarningActive = false;

          // 設定難度階段
          this.stages = [
            { name: "入門", minCorrect: 0, maxDifficulty: 0.3, timeBonus: 1.5 },
            { name: "基礎", minCorrect: 5, maxDifficulty: 0.5, timeBonus: 1.0 },

              name: "進階",

        create() {

            })
            .setDepth(51);
          this.drawHUD();

          this.title = this.add.text(

            {
              font: "bold 32px Arial",
              fill: "#fff",
              stroke: "#000",
              strokeThickness: 6,
            }
          );
          this.scoreText = this.add.text(
            SAFE_PAD + 8,
            SAFE_PAD + 56,
            `${TEXTS.chance}: ${this.score}`,
            {
              font: "bold 28px Arial",
              fill: "#fff",
              stroke: "#000",
              strokeThickness: 6,
            }
          );

          this.timerGfx = this.add.graphics();
          this.timerText = this.add
            .text(
              GAME_W - SAFE_PAD - 140,
              SAFE_PAD + 20,
              `${TEXTS.time}: ${this.timeLeft}`,
              {
                font: "bold 28px Arial",
                fill: "#fff",
                stroke: "#000",
                strokeThickness: 6,
              }
            )
            .setOrigin(0, 0.5);
          this.updateTimerBar();

          this.backBtn = makeButton(
            this,
            GAME_W - SAFE_PAD - 90,
            SAFE_PAD + 96,
            "回主頁"
          ).setDepth(20);
          this.input.on("pointerdown", (raw) => {
            if (this.modalOpen) return;
            const p = this.mapPointer(raw.event);
            if (
              Phaser.Geom.Rectangle.Contains(this.backBtn.getBounds(), p.x, p.y)
            )
              this.askBackHome();
          });

          this.timeEvent = this.time.addEvent({
            delay: 1000,
            loop: true,
            callback: () => {
              if (this.isGameOver || this.modalOpen) return;
              this.timeLeft = Math.max(0, this.timeLeft - 1);
              this.updateTimerBar();
              if (this.timeLeft <= 0) this.finish(false);
            },
          });

          this.startTime = performance.now();
          this.loadLevel(0);

          this.input.on("pointermove", (raw) => {
            if (this.modalOpen) return;
            const p = this.mapPointer(raw.event);
            this.updateHover(p);
          });

          this.input.on("pointerdown", (raw) => {
            if (this.modalOpen) return;
            // [Fix] Check clickLocked immediately to prevent race conditions or multi-touch issues
            if (this.clickLocked) return;
            
            const now = performance.now();
            if (now - this.lastClickAt < MIN_CLICK_GAP_MS) return;
            this.lastClickAt = now;

            const p = this.mapPointer(raw.event);
            if (!this.opts || !this.opts.length || this.isGameOver) return;

            let hitIndex = -1;
            for (let i = 0; i < this.opts.length; i++) {
              if (
                Phaser.Geom.Rectangle.Contains(
                  this.opts[i].getBounds(),
                  p.x,
                  p.y
                )
              ) {
                hitIndex = i;
                break;
              }
            }
            if (hitIndex === -1) return;

            // [Fix] Lock immediately after validating hit
            this.clickLocked = true;
            this._rtStart = this._rtStart || performance.now();
            this.pick(hitIndex, p, performance.now() - this._rtStart);
            this._rtStart = performance.now();
          });
        }

        // 取得當前階段
        getCurrentStage() {
          for (let i = this.stages.length - 1; i >= 0; i--) {
            if (this.correctCount >= this.stages[i].minCorrect) {
              return this.stages[i];
            }
          }
          return this.stages[0];
        }

        // 顯示階段提示
        showStageBanner(stageName) {
          const banner = this.add
            .container(GAME_W / 2, GAME_H / 2 - 100)
            .setDepth(900);

          bg.fillRoundedRect(-200, -40, 400, 80, 16);

          bg.strokeRoundedRect(-200, -40, 400, 80, 16);
          banner.add(bg);

          // 文字
          const text = this.add
            .text(0, -10, TEXTS.stage_intro + stageName + "階段", {
              font: "bold 32px Arial",
              fill: "#FFFFFF",
            })
            .setOrigin(0.5);
          const subtext = this.add
            .text(0, 20, TEXTS.stage_difficulty, {
              font: "24px Arial",
              fill: "#FFFFFF",
            })
            .setOrigin(0.5);
          banner.add(text);
          banner.add(subtext);

          // 動畫
          banner.setAlpha(0);
          banner.setScale(0.5);
          this.tweens.add({
            targets: banner,
            alpha: 1,
            scale: 1,

            ease: "Back.easeOut",
            onComplete: () => {

                  alpha: 0,
                  scale: 0.8,
                  duration: 300,
                  onComplete: () => banner.destroy(),
                });
              });
            },
          });
        }

        drawHUD() {
          const d = this.ddm?.d ?? 0.5;
          const x = SAFE_PAD + 6,
            y = SAFE_PAD + 4,
            w = 320,
            h = 10;
          this.hudText.setText(`${TEXTS.difficulty} d=${d.toFixed(2)}`);
          this.hudG.clear();
          this.hudG
            .fillStyle(0x000000, 0.35)
            .fillRoundedRect(x - 2, y - 2, w + 4, h + 4, 6);
          this.hudG.lineStyle(2, 0xffffff, 1).strokeRoundedRect(x, y, w, h, 6);
          const ratio = Phaser.Math.Clamp((d - 0.15) / (0.95 - 0.15), 0, 1);
          this.hudG
            .fillStyle(0xffd166, 1)
            .fillRoundedRect(x + 1, y + 1, (w - 2) * ratio, h - 2, 5);
        }

        updateTimerBar() {
          const x = GAME_W - SAFE_PAD - 380,
            y = SAFE_PAD + 18,
            w = 360,
            h = 22;
          const ratio = Phaser.Math.Clamp(this.timeLeft / TIME_START, 0, 1);
          const color = this.timeLeft > 10 ? 0x3ac66e : 0xdc3545;
          this.timerText.setText(`${TEXTS.time}: ${this.timeLeft}`);
          this.timerGfx.clear();
          this.timerGfx
            .fillStyle(0x000000, 0.35)
            .fillRoundedRect(x - 2, y - 2, w + 4, h + 4, 10);
          this.timerGfx
            .lineStyle(2, 0xffffff, 1)
            .strokeRoundedRect(x, y, w, h, 10);
          this.timerGfx
            .fillStyle(color, 1)
            .fillRoundedRect(x + 1, y + 1, (w - 2) * ratio, h - 2, 9);

          // 時間少於10秒時閃爍提示
          if (
            this.timeLeft <= 10 &&
            !this.timeWarningActive &&
            this.timeLeft > 0
          ) {
            this.timeWarningActive = true;
            this.cameras.main.flash(300, 255, 0, 0, 0.3);
            const warningPulse = this.tweens.add({
              targets: this.timerText,
              scale: 1.1,
              duration: 300,
              yoyo: true,
              repeat: -1,
            });
          } else if (this.timeLeft > 10 && this.timeWarningActive) {
            this.timeWarningActive = false;
            this.tweens.killTweensOf(this.timerText);
            this.timerText.setScale(1);
          }
        }

        updateHover(p) {
          if (!this.opts || !this.opts.length) return;
          let newIndex = -1;
          for (let i = 0; i < this.opts.length; i++) {
            if (
              Phaser.Geom.Rectangle.Contains(this.opts[i].getBounds(), p.x, p.y)
            ) {
              newIndex = i;
              break;
            }
          }
          if (newIndex === this.hoverIndex) return;
          this.hoverIndex = newIndex;
          for (let i = 0; i < this.opts.length; i++) {
            const inner = this.opts[i].__inner;
            this.tweens.add({
              targets: inner,
              scale: i === newIndex ? 1.04 : 1.0,
              duration: 90,
              ease: "Quad.easeOut",
            });
          }
        }

        unloadTempTextures() {
          const tm = this.textures;
          this.tempKeys.forEach((k) => {
            if (tm.exists(k)) tm.remove(k);
          });
          this.tempKeys.length = 0;
        }

        // 出題：普通關（隨機干擾）＋特別關（3個獨立變體）
        async loadLevel(i) {
          this.levelIndex = i;
          this.unloadTempTextures();

          if (this.qCard) this.qCard.destroy();
          if (this.opts) this.opts.forEach((o) => o.destroy());

          const correctKey = rp(ALL_IMAGES);
          this.title.setText(`找出相同 第${i + 1}回合`);

          this.qCard = makeCard(this, correctKey, true, null);
          this.qCard.x =
            SAFE_PAD + (GAME_W - SAFE_PAD * 2) / 2 - this.qCard.width / 2;
          this.qCard.y = SAFE_PAD + 110;

          const isBonus = i > 0 && (i + 1) % BONUS_ROUND_INTERVAL === 0;

          if (this.tip && this.tip.active) this.tip.destroy();
          this.tip = this.add.text(
              GAME_W / 2,
              SAFE_PAD + 60,
              isBonus ? TEXTS.tip_bonus : TEXTS.tip,
              {
                font: "28px Arial",
                fill: isBonus ? "#FFD700" : "#fff",
                stroke: "#000",
                strokeThickness: 6,
              }
            )
            .setOrigin(0.5);

          let distractors = [];
          if (isBonus) {
            // 特別關：使用 AI 生成相似度變體
            let varKeys = [];
            if (typeof SimilarityPipeline !== "undefined") {
              try {
                 varKeys = await SimilarityPipeline.generateVariants(
                    this,
                    correctKey,
                    3,
                    this.ddm.d
                 );
              } catch(e) {
                console.error("SimilarityPipeline error", e);
              }
            }
            this.tempKeys.push(...varKeys);
            distractors.push(...varKeys);
            // 若變體不足，補隨機
            while (distractors.length < 3) {
              const k = rp(
                ALL_IMAGES.filter(
                  (k) => k !== correctKey && !distractors.includes(k)
                )
              );
              distractors.push(k);
            }
          } else {
            // 普通關：3個隨機干擾
            const pool = ALL_IMAGES.filter((k) => k !== correctKey);
            shuffle(pool);
            distractors = pool.slice(0, 3);
          }

          const letters = ["A", "B", "C", "D"];
          const totalW = 4 * 210 + 3 * 30;
          const startX = SAFE_PAD + (GAME_W - SAFE_PAD * 2 - totalW) / 2;
          const y = SAFE_PAD + 360;

          let options = [correctKey, ...distractors];
          shuffle(options);
          this.answerIndex = options.indexOf(correctKey);

          this.opts = [];
          for (let idx = 0; idx < 4; idx++) {
            const k = options[idx];
            const usable = this.textures.exists(k) ? k : correctKey;
            const card = makeCard(this, usable, false, letters[idx]);
            card.x = startX + idx * (210 + 30);
            card.y = y;
            this.opts.push(card);
          }

          this.hoverIndex = -1;
          
          // [Fix] Remove auto-unlock here if called from pick logic, let pick manage unlock timing.
          // Or ensure we only unlock if it's the very first load or explicit restart.
          if(i === 0) {
              this.time.delayedCall(50, () => (this.clickLocked = false));
          } else {
             // For subsequent levels, ensure we DO unlock eventually if pick's timer fired too early
             // (e.g. if async generation took very long). 
             // But usually pick's generic timer is safer. 
             // Just in case, set a failsafe unlock to prevent potential soft-lock if pick's timer got cleared or confused.
             this.time.delayedCall(1500, () => (this.clickLocked = false));
          }
          this._rtStart = performance.now();
          this.drawHUD();
        }

        pick(idx, pointerWorld, rtMs) {
          const isCorrect = idx === this.answerIndex;

          // 記錄這一輪的數據
          const roundData = {
            roundIndex: this.levelIndex,
            difficulty: this.ddm.d,
            responseTimeMs: rtMs,
            isCorrect: isCorrect,
            isBonus:
              this.levelIndex > 0 &&
              (this.levelIndex + 1) % BONUS_ROUND_INTERVAL === 0,
            timestamp: new Date().getTime(),
          };
          this.roundStats.push(roundData);
          this.responseTimeTotal += rtMs;

          if (isCorrect) {
            // 立即視覺反饋
            fxCorrect(this, this.opts[idx]);
            spawnPlusOne(this, pointerWorld.x, pointerWorld.y - 20);

            // 獲取當前階段獎勵
            const newStage = this.getCurrentStage();
            const timeBonus = newStage.timeBonus || TIME_BONUS;

            // 檢查階段變化
            const prevStage = this.currentStage;
            this.currentStage = newStage;

            this.score += 10;
            this.correctCount += 1;
            this.timeLeft = Math.min(TIME_START, this.timeLeft + timeBonus);
            this.updateTimerBar();

            // 如果進入新階段，顯示提示
            if (prevStage !== newStage) {
              this.showStageBanner(newStage.name);
            }

            this.scoreText.setText(`${TEXTS.chance}: ${this.score}`);

            this.ddm.record(true, rtMs || 1500);
            // 限制最大難度
            const maxDifficulty = newStage.maxDifficulty;
            if (this.ddm.d > maxDifficulty) {
              this.ddm.d = maxDifficulty;
            }
            this.drawHUD();

            if (this.correctCount >= TARGET_CORRECT) {
              this.finish(true);
              return;
            }

            // 減少延遲時間，讓遊戲更流暢
            this.time.delayedCall(250, () => {
              this.loadLevel(this.levelIndex + 1);
            });

            // 縮短點擊鎖定時間, 但確保不會過早解鎖導致連續點擊
            // [Fix] Increase lock time slightly to prevent accidental double taps
            this.time.delayedCall(600, () => {
              this.clickLocked = false;
            });
          } else {
            this.score -= 5;
            this.scoreText.setText(`${TEXTS.chance}: ${this.score}`);
            fxWrong(this, this.opts[idx]);
            this.ddm.record(false, Math.max(rtMs || 2200, 2200));
            this.drawHUD();
            // [Fix] Increase penalty lock time slightly
            this.time.delayedCall(500, () => (this.clickLocked = false));
          }
        }

        async finish(isClear) {
          if (this.isGameOver) return;
          this.isGameOver = true;
          this.clickLocked = true;

          const usedMs = Math.max(
            0,
            performance.now() - (this.startTime || performance.now())
          );
          const usedSec = Math.round(usedMs / 1000);

          const title = isClear ? "通關成功！" : "時間到！";
          const detail = isClear
            ? `完成 ${TARGET_CORRECT} 題，用時 ${usedSec} 秒`
            : `共完成 ${this.correctCount} 題`;
          const gi = isClear
            ? gradeByPerformance(usedSec, this.correctCount, TARGET_CORRECT)
            : { grade: "—", msg: "再試一次吧！" };

          const dim = this.add.rectangle(
            GAME_W / 2,
            GAME_H / 2,
            GAME_W,
            GAME_H,
            0x000000,
            0.55
          );
          const pane = this.add.graphics({
            x: GAME_W / 2 - 300,
            y: GAME_H / 2 - 180,
          });
          pane.fillStyle(0xffffff, 1).fillRoundedRect(0, 0, 600, 320, 14);
          pane.lineStyle(3, 0x333333, 1).strokeRoundedRect(0, 0, 600, 320, 14);

          this.add
            .text(GAME_W / 2, GAME_H / 2 - 110, title, {
              font: "bold 40px Arial",
              fill: "#222",
            })
            .setOrigin(0.5);
          this.add
            .text(GAME_W / 2, GAME_H / 2 - 60, detail, {
              font: "28px Arial",
              fill: "#333",
            })
            .setOrigin(0.5);
          this.add
            .text(GAME_W / 2, GAME_H / 2 - 10, `Grade: ${gi.grade}`, {
              font: "bold 36px Arial",
              fill: "#0a6",
            })
            .setOrigin(0.5);
          this.add
            .text(GAME_W / 2, GAME_H / 2 + 30, gi.msg, {
              font: "24px Arial",
              fill: "#222",
            })
            .setOrigin(0.5);

          const replay = makeButton(
            this,
            GAME_W / 2 - 100,
            GAME_H / 2 + 110,
            "重玩"
          );
          const home = makeButton(
            this,
            GAME_W / 2 + 100,
            GAME_H / 2 + 110,
            "回主頁"
          );

          // 記錄遊戲數據
          try {
            await logGameData({
              sessionId: this.sessionId,
              totalRounds: this.levelIndex + 1,
              correctCount: this.correctCount,
              responseTimeTotal: this.responseTimeTotal,
              difficulty: this.ddm.d,
              difficultyHistory: this.ddm.diffHistory,
              roundStats: this.roundStats,
              finalGrade: gi.grade,
              timeUsedSec: usedSec,
              completionStatus: isClear ? "complete" : "timeout",
            });
          } catch (error) {
            console.error("Error logging game data:", error);
          }

          const onDown = (raw) => {
            const p = this.mapPointer(raw.event);
            if (Phaser.Geom.Rectangle.Contains(replay.getBounds(), p.x, p.y)) {
              this.input.off("pointerdown", onDown);
              this.unloadTempTextures();
              this.scene.restart();
            } else if (
              Phaser.Geom.Rectangle.Contains(home.getBounds(), p.x, p.y)
            ) {
              this.input.off("pointerdown", onDown);
              this.unloadTempTextures();
              // 返回超市主題頁面而不是根目錄
              window.location.href = THEME_URL;
            }
          };
          this.input.on("pointerdown", onDown);
        }

        askBackHome() {
          if (this.modalOpen) return;
          this.modalOpen = true;

          const dim = this.add
            .rectangle(GAME_W / 2, GAME_H / 2, GAME_W, GAME_H, 0x000000, 0.55)
            .setDepth(1900)
            .setInteractive();
          const pane = this.add
            .graphics({ x: GAME_W / 2 - 260, y: GAME_H / 2 - 120 })
            .setDepth(2000);
          pane.fillStyle(0xffffff, 1).fillRoundedRect(0, 0, 520, 220, 14);
          pane.lineStyle(3, 0x333333, 1).strokeRoundedRect(0, 0, 520, 220, 14);
          const t = this.add
            .text(GAME_W / 2, GAME_H / 2 - 40, TEXTS.confirmHome, {
              font: "28px Arial",
              fill: "#222",
            })
            .setOrigin(0.5)
            .setDepth(2000);
          const yes = makeButton(
            this,
            GAME_W / 2 - 90,
            GAME_H / 2 + 60,
            TEXTS.yes
          ).setDepth(2000);
          const no = makeButton(
            this,
            GAME_W / 2 + 90,
            GAME_H / 2 + 60,
            TEXTS.no
          ).setDepth(2000);

          const close = () => {
            [dim, pane, t, yes, no].forEach((o) => o && o.destroy());
            this.modalOpen = false;
            this.unloadTempTextures();
          };

          const onDown = (raw) => {
            const p = this.mapPointer(raw.event);
            if (Phaser.Geom.Rectangle.Contains(yes.getBounds(), p.x, p.y)) {
              this.input.off("pointerdown", onDown);
              this.unloadTempTextures();
              // 返回超市主題頁面而不是根目錄
              window.location.href = THEME_URL;
            } else if (
              Phaser.Geom.Rectangle.Contains(no.getBounds(), p.x, p.y)
            ) {
              this.input.off("pointerdown", onDown);
              close();
            }
          };
          this.input.on("pointerdown", onDown);
          this.input.keyboard?.once("keydown-ESC", () => {
            this.input.off("pointerdown", onDown);
            close();
          });
        }
      }

      // --- 遊戲啟動主邏輯 ---
      async function initGame() {
        try {
          // 1. 從後端 API 獲取圖片列表
          const response = await fetch('/api/games/sportcentre/images');
          if (!response.ok) {
            throw new Error(`API 請求失敗: ${response.statusText}`);
          }
          ALL_IMAGES = await response.json();

          if (!ALL_IMAGES || ALL_IMAGES.length < 10) {
             console.error("錯誤：可用的圖片資源不足。至少需要10張圖片。");
             document.getElementById('game-container').innerHTML = `<div style="color:white; text-align:center; padding: 50px;">遊戲資源加載失敗：圖片數量不足。</div>`;
             return;
          }

          // 2. 獲取到圖片列表後，才創建和啟動 Phaser 遊戲
          const game = new Phaser.Game({
            type: Phaser.WEBGL,
            width: GAME_W,
            height: GAME_H,
            parent: "game-container",
            backgroundColor: "#000000",
            scene: [SceneMenu, SceneGame],
            scale: {
              mode: Phaser.Scale.FIT,
              autoCenter: Phaser.Scale.CENTER_BOTH,
              expandParent: true,
            },
            input: { activePointers: 1, windowEvents: true },
            render: { antialias: true, premultipliedAlpha: true },
            loader: { 
              // 由於 API 返回的是完整 URL 路徑，baseURL 設為空
              baseURL: '',
              crossOrigin: "anonymous" 
            },
          });

        } catch (error) {
          console.error("無法初始化遊戲:", error);
          document.getElementById('game-container').innerHTML = `<div style="color:white; text-align:center; padding-top: 50px;">遊戲加載失敗，請檢查後端服務是否正常或刷新頁面。</div>`;
        }
      }

      // 執行主函數
      initGame();

    </script>
  </body>
</html>
